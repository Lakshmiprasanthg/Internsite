<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon - Rounded square with "IS" -->
  <rect x="5" y="10" width="40" height="40" rx="10" fill="url(#grad1)"/>
  <text x="25" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">IS</text>
  
  <!-- InternSite Text -->
  <text x="55" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#grad2)">Intern</text>
  <text x="55" y="44" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#grad2)">Site</text>
  
  <!-- Decorative element - small dot -->
  <circle cx="130" cy="42" r="2" fill="#4f46e5"/>
</svg>
